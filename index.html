<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase | Photography</title>
    <link rel="stylesheet" href="styles.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-icon logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="20" x2="20" y2="4"></line>
                <line x1="4" y1="14" x2="14" y2="4"></line>
            </svg>
        </div>
        <div class="nav-icon cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
        </div>
    </nav>

    <header class="portfolio-header">
        <h1>Chase Gesteland</h1>
        <p>Some of my stuff</p>
        <a href="#contact" class="contact-link">Contact</a>
    </header>

    <main class="gallery-container">
       <img src="web-ready/mussels_G2.jpg" 
         alt="Black and white photo of Mussels"
         data-title="Mussels"
         data-description="4x5 HP5+, 2026">

        <img src="web-ready/daft600crop.jpg" 
         alt="Abstract red, yellow, white and blue polaroid photo with a daft punk helmet"
         data-title="Daftendirekt"
         data-description="Manipulated Polaroid 600 i-Type, 2026">

        <img src="web-ready/cornerstore.jpg" 
         alt="Black and white photo of a corner store at dusk"
         data-title="Cornerstore"
         data-description="6x9cm Kentmere 200, 2026">

        <img src="web-ready/cliff.jpg" 
         alt="Black and white photo of a cliff in shade."
         data-title="Cliff"
         data-description="4x5 HP5+, 2026">

        <img src="web-ready/lake.jpg" 
         alt="Black and white photo of a Silver Lake."
         data-title="Silver Lake"
         data-description="4x5 HP5+, 2026">

        <img src="web-ready/log.jpg" 
         alt="Black and white photo of a log."
         data-title="Log"
         data-description="4x5 HP5+, 2026">

        <img src="web-ready/tree.jpg" 
         alt="Black and white photo of a tree."
         data-title="Tree"
         data-description="4x5 HP5+, 2026">

        <img src="web-ready/Stinson_Clouds.jpg" 
         alt="Color photo of clouds at sunset."
         data-title="Clouds"
         data-description="35mm Ektar 100, 2018">

        <img src="web-ready/Stinson_Dock_Boat.jpg" 
         alt="Color photo of a boat at a dock in the fog."
         data-title="Stinson Dock"
         data-description="35mm Ektar 100, 2018">

        <img src="web-ready/Stinson_Houses.jpg" 
         alt="Color photo of a houses on a bay in daylight."
         data-title="Stinson Houses"
         data-description="35mm Ektar 100, 2018">

        <img src="web-ready/Stinson_Plane.jpg" 
         alt="Color photo of a plane against clouds at sunset."
         data-title="Plane at Sunset"
         data-description="35mm Ektar 100, 2018">
        
        <img src="web-ready/olympuswinter.jpg" 
         alt="Color photo of Mt. Olympus (SLC) in Winter."
         data-title="Mt. Olympus in Winter"
         data-description="35mm Ektar 100, 2018">

    </main>

    <div id="lightbox" class="lightbox">
        <span id="lightbox-close" class="close-btn">&times;</span>
    
        <button id="lightbox-prev" class="nav-btn prev-btn">&#10094;</button>
            <button id="lightbox-next" class="nav-btn next-btn">&#10095;</button>
    
        <img class="lightbox-content" id="lightbox-img" alt="Enlarged photograph">
        <div id="lightbox-caption" class="lightbox-caption">
            <h3 id="lightbox-title"></h3>
            <p id="lightbox-desc"></p>
        </div> 
    </div>

    
</div>
</body>
</html>
