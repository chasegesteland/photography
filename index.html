<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase | Photography</title>
    <link rel="stylesheet" href="styles.css">
    <script src="js/main.js" defer></script>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-icon logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="20" x2="20" y2="4"></line>
                <line x1="4" y1="14" x2="14" y2="4"></line>
            </svg>
        </div>
        <div class="nav-icon cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
        </div>
    </nav>

    <header class="portfolio-header">
        <h1>Chase Gesteland</h1>
        <p>Some of my photography</p>
        <a href="#contact" class="contact-link">Contact</a>
    </header>

    <main class="gallery-container">
       <img src="web-ready/mussels_large_final.jpg" alt="Black and white picture of mussels on a rock">
    </main>

    <div id="lightbox" class="lightbox">
    <span class="close-btn">&times;</span>
    <img class="lightbox-content" id="lightbox-img" alt="Enlarged photograph">
</div>
</body>
</html>
